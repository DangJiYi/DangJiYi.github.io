          <div class="post-content">
            <p>使用平台debian10</p>
<p>安装chrome、chrome插件tampermonkey、</p>
<!-- more -->
<p>tampermonkey脚本<a href="https://github.com/the1812/Bilibili-Evolved">Bilibili-Evolved</a></p>
<p>安装<a href="https://aria2.github.io">aria2</a></p>
<p><code>sudo apt install aria2</code></p>
<p>插件会在b站视频页面左侧显示工具箱，选择下载视频，选择导出 aria2</p>
<p>这时会下载一个txt</p>
<p>打开终端，输入</p>
<p><code>aria2c -i 视频名称.txt</code></p>
<p>即可下载视频</p>
